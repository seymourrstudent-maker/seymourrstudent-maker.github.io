<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Chat | Rapheal Seymour</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#0d0f14;--surface:#13161e;--surface2:#1a1e28;--border:#252a38;
      --accent:#5bf5c2;--accent2:#7c6dfa;--accent3:#f5a05b;
      --text:#e8eaf0;--muted:#6b7280;--nav-h:64px;
      --green:#3ecf8e;--yellow:#f0b429;--red:#f66;
      --font-mono:'JetBrains Mono','DM Mono',monospace;--radius:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-weight:300;overflow:hidden;display:flex;flex-direction:column}

    /* ── site nav ── */
    nav{height:var(--nav-h);background:rgba(13,15,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;z-index:100;flex-shrink:0}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--accent);text-decoration:none;letter-spacing:-0.02em}
    .nav-links{display:flex;gap:0.25rem;list-style:none}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:0.75rem;font-weight:400;letter-spacing:0.08em;text-transform:uppercase;padding:0.4rem 0.75rem;border-radius:4px;transition:color 0.2s,background 0.2s}
    .nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--surface2)}
    .nav-dropdown{position:relative}.nav-dropdown::after{content:'';position:absolute;left:0;bottom:-8px;width:100%;height:8px}
    .nav-dropdown>span{color:var(--muted);font-size:0.75rem;font-weight:400;letter-spacing:0.08em;text-transform:uppercase;padding:0.4rem 0.75rem;border-radius:4px;cursor:pointer;transition:color 0.2s,background 0.2s;display:flex;align-items:center;gap:0.3rem}
    .nav-dropdown:hover>span{color:var(--text);background:var(--surface2)}
    .dropdown-menu{position:absolute;top:calc(100% + 8px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.5rem;min-width:140px;opacity:0;pointer-events:none;transform:translateY(-4px);transition:opacity 0.2s,transform 0.2s}
    .nav-dropdown:hover .dropdown-menu{opacity:1;pointer-events:all;transform:translateY(0)}
    .dropdown-menu a{display:block;color:var(--muted);text-decoration:none;font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;padding:0.45rem 0.75rem;border-radius:4px;transition:color 0.2s,background 0.2s}
    .dropdown-menu a:hover{color:var(--text);background:var(--surface2)}

    /* ── app shell ── */
    .app{flex:1;display:grid;grid-template-rows:auto 1fr auto;max-width:860px;width:100%;margin:0 auto;padding:0 16px;overflow:hidden}

    /* ── chat header ── */
    .chat-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 14px;border-bottom:1px solid var(--border);gap:12px;flex-shrink:0;flex-wrap:wrap}
    .chat-logo{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;letter-spacing:-0.02em;color:var(--accent)}
    .room-badge{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-family:var(--font-mono);font-size:.8rem}
    .room-badge .code{color:var(--accent);font-weight:600;letter-spacing:0.12em}
    .room-badge .copy-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:0;font-size:.75rem;transition:color .2s;font-family:var(--font-mono)}
    .room-badge .copy-btn:hover{color:var(--accent)}
    #toolbar{display:none;gap:8px;flex-wrap:wrap;align-items:center}
    #toolbar.active{display:flex}
    .btn-sm{padding:6px 12px;font-size:.72rem;background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;transition:color .2s,border-color .2s}
    .btn-sm:hover{color:var(--text);border-color:var(--accent)}

    /* ── connect panel ── */
    #connect-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px 16px;overflow-y:auto;animation:fadeUp .35s ease}

    /* mode toggle */
    .mode-tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;gap:4px;width:100%;max-width:400px}
    .mode-tab{flex:1;padding:8px 0;border:none;border-radius:7px;background:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s,color .2s}
    .mode-tab.active{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

    /* form fields */
    .connect-form{display:flex;flex-direction:column;gap:14px;width:100%;max-width:400px;animation:fadeUp .25s ease}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
    .field input{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;font-family:var(--font-mono);font-size:.88rem;color:var(--text);outline:none;transition:border-color .2s;width:100%}
    .field input:focus{border-color:var(--accent)}

    /* generated room code display */
    .code-display{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
    .code-display .big-code{font-family:var(--font-mono);font-size:1.6rem;font-weight:600;color:var(--accent);letter-spacing:0.25em;flex:1}
    .code-display .icon-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;padding:6px 9px;font-size:.8rem;transition:color .2s,border-color .2s;font-family:var(--font-mono)}
    .code-display .icon-btn:hover{color:var(--accent);border-color:var(--accent)}
    .code-hint{font-size:.72rem;color:var(--muted);text-align:center;line-height:1.6;max-width:400px}

    .btn-primary{display:flex;align-items:center;justify-content:center;background:var(--accent);color:var(--bg);width:100%;max-width:400px;padding:13px;border-radius:var(--radius);border:none;font-family:'DM Mono',monospace;font-size:.8rem;font-weight:500;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;transition:filter .15s,transform .1s}
    .btn-primary:hover{filter:brightness(1.1)}
    .btn-primary:active{transform:scale(.97)}

    /* ── messages ── */
    #chat-area{display:none;flex-direction:column;overflow:hidden}
    #chat-area.active{display:flex}
    #messages{flex:1;overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth}
    #messages::-webkit-scrollbar{width:4px}
    #messages::-webkit-scrollbar-track{background:transparent}
    #messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    .msg{display:flex;gap:10px;padding:5px 8px;border-radius:8px;animation:fadeUp .18s ease;line-height:1.55}
    .msg:hover{background:var(--surface)}
    .msg-ts{font-family:var(--font-mono);font-size:.7rem;color:var(--muted);flex-shrink:0;padding-top:3px}
    .msg-body{flex:1;min-width:0}
    .msg-author{font-weight:600;font-size:.82rem;margin-bottom:2px}
    .msg-text{font-size:.9rem;word-break:break-word}
    .msg.system .msg-text{color:var(--muted);font-style:italic;font-size:.82rem}
    .msg.system .msg-author{display:none}
    .msg.join .msg-text{color:var(--green)}
    .msg.leave .msg-text{color:var(--yellow)}
    .msg.own .msg-author{color:var(--accent)}
    .uc-0{color:#f472b6}.uc-1{color:#fb923c}.uc-2{color:#34d399}.uc-3{color:#a78bfa}
    .uc-4{color:#38bdf8}.uc-5{color:#fbbf24}.uc-6{color:#e879f9}.uc-7{color:#4ade80}

    /* ── input bar ── */
    #input-bar{display:flex;gap:10px;padding:14px 0 20px;border-top:1px solid var(--border);align-items:flex-end;flex-shrink:0}
    #msg-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;font-family:'DM Mono',monospace;font-size:.9rem;color:var(--text);outline:none;resize:none;max-height:120px;line-height:1.5;transition:border-color .2s}
    #msg-input:focus{border-color:var(--accent)}
    #msg-input::placeholder{color:var(--muted)}
    #send-btn{background:var(--accent);border:none;border-radius:var(--radius);width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:filter .15s,transform .1s;color:var(--bg)}
    #send-btn:hover{filter:brightness(1.1)}
    #send-btn:active{transform:scale(.94)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:768px){.nav-links{display:none}}
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="../../HomeFolder/index.html">Rapheal Seymour</a>
    <ul class="nav-links">
      <li><a href="../../HomeFolder/index.html">Home</a></li>
      <li><a href="../../AboutFolder/about.html">About</a></li>
      <li><a href="../../ExperienceFolder/experience.html">Experience</a></li>
      <li><div class="nav-dropdown"><span>College ▾</span><div class="dropdown-menu"><a href="../../CollegeFolder/college.html">Overview</a><a href="../../CollegeFolder/college-school.html">School Projects</a><a href="../../CollegeFolder/college-personal.html">Personal Projects</a></div></div></li>
      <li><div class="nav-dropdown"><span>Work ▾</span><div class="dropdown-menu"><a href="../../WorkFolder/work.html">Overview</a><a href="../../WorkFolder/work-broadcast.html">Broadcast</a><a href="../../WorkFolder/work-projects.html">Projects</a></div></div></li>
      <li><a href="../../ActivitiesFolder/activities.html">Activities</a></li>
      <li><a href="../../ContactFolder/contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="app">

    <!-- Chat header -->
    <div class="chat-header">
      <span class="chat-logo">Group Chat</span>
      <div id="room-badge" class="room-badge" style="display:none">
        Room <span id="badge-code" class="code"></span>
        <button class="copy-btn" onclick="copyRoomCode()" title="Copy room code">Copy</button>
      </div>
      <div id="toolbar">
        <button class="btn-sm" onclick="listUsers()">👥 who's here</button>
        <button class="btn-sm" onclick="leaveRoom()">⏻ leave</button>
      </div>
    </div>

    <!-- Connect panel -->
    <div id="connect-panel">
      <div class="mode-tabs">
        <button class="mode-tab active" id="tab-create" onclick="setMode('create')">Create Room</button>
        <button class="mode-tab" id="tab-join" onclick="setMode('join')">Join Room</button>
      </div>

      <!-- Create mode -->
      <div class="connect-form" id="create-form">
        <div class="field">
          <label>Your name</label>
          <input id="create-name" type="text" placeholder="e.g. Rapheal" maxlength="24" />
        </div>
        <div class="field">
          <label>Room code (share this with others)</label>
          <div class="code-display">
            <span class="big-code" id="generated-code"></span>
            <button class="icon-btn" onclick="regenerateCode()" title="Generate new code">↺</button>
            <button class="icon-btn" onclick="copyGeneratedCode()">Copy</button>
          </div>
        </div>
        <button class="btn-primary" onclick="createRoom()">Start Room →</button>
        <p class="code-hint">Open a new tab, go to this page, choose <strong>Join Room</strong>, and enter the code above.</p>
      </div>

      <!-- Join mode -->
      <div class="connect-form" id="join-form" style="display:none">
        <div class="field">
          <label>Your name</label>
          <input id="join-name" type="text" placeholder="e.g. Alice" maxlength="24" />
        </div>
        <div class="field">
          <label>Room code</label>
          <input id="join-code" type="text" placeholder="e.g. WXYZ" maxlength="8" style="text-transform:uppercase;letter-spacing:0.15em;font-size:1rem" />
        </div>
        <button class="btn-primary" onclick="joinRoom()">Join Room →</button>
      </div>
    </div>

    <!-- Chat area -->
    <div id="chat-area">
      <div id="messages"></div>
      <div id="input-bar">
        <textarea id="msg-input" rows="1" placeholder="Message… (Enter to send, Shift+Enter for newline)"></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Send">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

<script>
  // ── state ─────────────────────────────────────────────────────────────────
  let channel  = null;
  let myName   = "";
  let roomCode = "";
  let onlineUsers = new Set();
  let colorMap = {};
  let colorIdx = 0;

  const COLORS = ["uc-0","uc-1","uc-2","uc-3","uc-4","uc-5","uc-6","uc-7"];
  const CHARS  = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const $messages     = document.getElementById("messages");
  const $msgInput     = document.getElementById("msg-input");
  const $connectPanel = document.getElementById("connect-panel");
  const $chatArea     = document.getElementById("chat-area");
  const $toolbar      = document.getElementById("toolbar");
  const $roomBadge    = document.getElementById("room-badge");
  const $badgeCode    = document.getElementById("badge-code");

  // ── mode toggle ───────────────────────────────────────────────────────────
  function setMode(mode) {
    document.getElementById("create-form").style.display = mode === "create" ? "flex" : "none";
    document.getElementById("join-form").style.display   = mode === "join"   ? "flex" : "none";
    document.getElementById("tab-create").classList.toggle("active", mode === "create");
    document.getElementById("tab-join").classList.toggle("active", mode === "join");
  }

  // ── room code generation ──────────────────────────────────────────────────
  function generateCode() {
    return Array.from({length: 4}, () => CHARS[Math.floor(Math.random() * CHARS.length)]).join("");
  }

  function regenerateCode() {
    document.getElementById("generated-code").textContent = generateCode();
  }

  function copyGeneratedCode() {
    const code = document.getElementById("generated-code").textContent;
    navigator.clipboard.writeText(code).then(() => flashCopy("generated-code"));
  }

  function copyRoomCode() {
    navigator.clipboard.writeText(roomCode).then(() => {
      const btn = document.querySelector(".room-badge .copy-btn");
      const prev = btn.textContent;
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = prev, 1500);
    });
  }

  function flashCopy(id) {
    const el = document.getElementById(id);
    const prev = el.style.color;
    el.style.color = "var(--green)";
    setTimeout(() => el.style.color = prev, 1000);
  }

  // ── enter room (shared logic) ─────────────────────────────────────────────
  function enterRoom(code, name) {
    roomCode = code.toUpperCase().replace(/\s/g, "");
    myName   = name.trim();

    if (!roomCode || !myName) { alert("Please fill in all fields."); return; }

    onlineUsers.clear();
    onlineUsers.add(myName);
    colorMap = {};
    colorIdx = 0;

    channel = new BroadcastChannel("groupchat_" + roomCode);
    channel.onmessage = handleIncoming;

    // Announce ourselves to any other tabs already in the room
    channel.postMessage({ type: "join", name: myName, ts: now() });

    $connectPanel.style.display = "none";
    $chatArea.classList.add("active");
    $toolbar.classList.add("active");
    $badgeCode.textContent = roomCode;
    $roomBadge.style.display = "flex";
    $msgInput.focus();

    addMessage({ ts: now(), text: `You joined room ${roomCode}`, type: "join" });
  }

  function createRoom() {
    const name = document.getElementById("create-name").value.trim();
    const code = document.getElementById("generated-code").textContent;
    enterRoom(code, name);
  }

  function joinRoom() {
    const name = document.getElementById("join-name").value.trim();
    const code = document.getElementById("join-code").value.trim();
    enterRoom(code, name);
  }

  // ── incoming messages ─────────────────────────────────────────────────────
  function handleIncoming(event) {
    const msg = event.data;

    if (msg.type === "join") {
      if (msg.name === myName) return;
      onlineUsers.add(msg.name);
      addMessage({ ts: msg.ts, text: `${msg.name} joined the room`, type: "join" });
      // Tell the new arrival we're here
      channel.postMessage({ type: "here", name: myName, ts: now() });
    }

    else if (msg.type === "here") {
      if (msg.name === myName) return;
      onlineUsers.add(msg.name);
    }

    else if (msg.type === "leave") {
      onlineUsers.delete(msg.name);
      addMessage({ ts: msg.ts, text: `${msg.name} left the room`, type: "leave" });
    }

    else if (msg.type === "message") {
      addMessage({ ts: msg.ts, author: msg.name, text: msg.text, type: "" });
    }
  }

  // ── send ──────────────────────────────────────────────────────────────────
  function sendMessage() {
    if (!channel) return;
    const text = $msgInput.value.trim();
    if (!text) return;

    const ts = now();
    // Render in our own tab (BroadcastChannel doesn't echo to sender)
    addMessage({ ts, author: myName, text, type: "own" });
    // Broadcast to other tabs
    channel.postMessage({ type: "message", name: myName, text, ts });

    $msgInput.value = "";
    $msgInput.style.height = "auto";
  }

  // ── commands ──────────────────────────────────────────────────────────────
  function listUsers() {
    const list = [...onlineUsers].sort().join(", ");
    addMessage({ ts: now(), text: `Online (${onlineUsers.size}): ${list}`, type: "system" });
  }

  function leaveRoom() {
    if (channel) {
      channel.postMessage({ type: "leave", name: myName, ts: now() });
      channel.close();
      channel = null;
    }
    $chatArea.classList.remove("active");
    $toolbar.classList.remove("active");
    $roomBadge.style.display = "none";
    $connectPanel.style.display = "flex";
    $messages.innerHTML = "";
    onlineUsers.clear();
  }

  // ── helpers ───────────────────────────────────────────────────────────────
  function colorFor(name) {
    if (name === myName) return "";
    if (!colorMap[name]) colorMap[name] = COLORS[colorIdx++ % COLORS.length];
    return colorMap[name];
  }

  function now() {
    return new Date().toLocaleTimeString("en-US", { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function addMessage({ ts, author, text, type }) {
    const el = document.createElement("div");
    el.className = "msg " + (type || "");

    const tsEl = document.createElement("span");
    tsEl.className = "msg-ts";
    tsEl.textContent = ts || "";

    const bodyEl = document.createElement("div");
    bodyEl.className = "msg-body";

    if (author) {
      const authorEl = document.createElement("div");
      authorEl.className = "msg-author " + (author === myName ? "" : colorFor(author));
      authorEl.textContent = author;
      bodyEl.appendChild(authorEl);
    }

    const textEl = document.createElement("div");
    textEl.className = "msg-text";
    textEl.textContent = text;
    bodyEl.appendChild(textEl);

    el.appendChild(tsEl);
    el.appendChild(bodyEl);
    $messages.appendChild(el);
    $messages.scrollTop = $messages.scrollHeight;
  }

  // ── textarea auto-resize + Enter key ─────────────────────────────────────
  $msgInput.addEventListener("input", () => {
    $msgInput.style.height = "auto";
    $msgInput.style.height = Math.min($msgInput.scrollHeight, 120) + "px";
  });

  $msgInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // Enter key on join fields
  ["create-name", "join-name", "join-code"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => {
      if (e.key === "Enter") id.startsWith("create") ? createRoom() : joinRoom();
    });
  });

  // Force uppercase on the join code field
  document.getElementById("join-code").addEventListener("input", function() {
    const pos = this.selectionStart;
    this.value = this.value.toUpperCase();
    this.setSelectionRange(pos, pos);
  });

  // Announce departure when the tab closes
  window.addEventListener("beforeunload", () => {
    if (channel) {
      channel.postMessage({ type: "leave", name: myName, ts: now() });
      channel.close();
    }
  });

  // ── init ──────────────────────────────────────────────────────────────────
  regenerateCode();
</script>
</body>
</html>
